apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-translator-ingress
  annotations:
    # מאפשר ל-Nginx לבצע שכתוב של ה-URL (חשוב עבור ה-API)
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: translator.local
    http:
      paths:
      # ניתוב עבור ה-Frontend (כל מה שאינו /api)
      - path: /()(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      # ניתוב עבור ה-Backend (כל מה שמתחיל ב- /api)
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3001