apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
      - name: translator
        image: libretranslate/libretranslate:latest
        resources:
          requests:
            memory: "512Mi"    # כמות הזיכרון המינימלית שהפוד יקבל
            cpu: "500m"       # חצי ליבה (Core)
          limits:
            memory: "1Gi"      # המקסימום שהפוד יכול לקחת
            cpu: "1000m"
        imagePullPolicy: IfNotPresent
        env:
        - name: LT_LOAD_ONLY
          value: "en,he"
        - name: LT_UPDATE_MODELS
          value: "false"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: translator-service
spec:
  selector:
    app: translator
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
