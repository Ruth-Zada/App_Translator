apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
      - name: translator
        image: libretranslate/libretranslate:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: LT_LOAD_ONLY
          value: "en,he"
        - name: LT_UPDATE_MODELS
          value: "false"
        - name: LT_OFFLINE 
          value: "true"
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 180 
          periodSeconds: 20
          failureThreshold: 5   
        readinessProbe:
          httpGet:
            path: /languages
            port: 5000
          initialDelaySeconds: 180
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: translator-service
spec:
  selector:
    app: translator
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP