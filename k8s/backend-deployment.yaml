apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ruthzada/app-translator-backend:latest 
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres-service:5432/translator_db"
        - name: TRANSLATOR_URL
          value: "http://translator-service:5000"