apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ruth630/app-translator-backend:v3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-service:5432/translations"
        - name: TRANSLATOR_HOST
          value: "translator-service"
        - name: TRANSLATOR_URL
          value: "http://translator-service:5000"
        
        # הגדרה מדויקת של ה-Probes
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3001     
      targetPort: 3001
  type: ClusterIP