name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ruth630
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and Push Backend
      run: |
        docker build -t ruth630/app-translator-backend:latest ./backend
        docker push ruth630/app-translator-backend:latest

    - name: Build and Push Frontend
      run: |
        docker build -t ruth630/app-translator-frontend:latest ./frontend
        docker push ruth630/app-translator-frontend:latest